name: dnikitin

services:
  app:
    build: .
    profiles:
      - app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/transit?reWriteBatchedInserts=true
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgis/postgis:18-3.6-alpine
    environment:
      POSTGRES_PASSWORD: transit_db
      POSTGRES_USER: transit
      POSTGRES_DB: transit
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:8.4-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
