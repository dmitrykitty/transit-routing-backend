spring:
  datasource:
    url: jdbc:h2:mem:transit-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
  data:
    redis:
      repositories:
        enabled: false
gtfs:
  initializer:
    enabled: false
  cities: {}
raptor:
  transfer:
    enabled: false
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
